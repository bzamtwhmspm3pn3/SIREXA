<!DOCTYPE html>
<html>
<head>
  <title>Teste de Login</title>
</head>
<body>
  <h2>Login Gestor</h2>
  <form id="loginForm">
    <input type="email" id="email" placeholder="Email" required><br>
    <input type="password" id="senha" placeholder="Senha" required><br>
    <button type="submit">Entrar</button>
  </form>

  <pre id="resposta"></pre>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const senha = document.getElementById("senha").value;

      try {
        const response = await fetch("http://localhost:5000/api/gestor/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, senha })
        });

        const data = await response.json();
        document.getElementById("resposta").textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        document.getElementById("resposta").textContent = "Erro ao tentar conectar.";
      }
    });
  </script>
</body>
</html>
